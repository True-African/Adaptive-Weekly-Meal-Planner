name: Test planner

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python -m py_compile scripts/adaptive_meal_planner.py
      - run: python -m unittest discover -s tests -p "test_*.py"
